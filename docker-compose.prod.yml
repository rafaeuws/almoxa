# ============================================================
#  Produção: app + PostgreSQL + Caddy (HTTPS automático)
#  Uso:  docker compose -f docker-compose.prod.yml up -d --build
# ============================================================
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-almox}
      POSTGRES_PASSWORD: ${PGPASSWORD:?defina PGPASSWORD no .env}
      POSTGRES_DB: ${PGDATABASE:-almoxarifado}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-almox} -d ${PGDATABASE:-almoxarifado}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-almox}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE:-almoxarifado}
      PGSSL: "false"
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-rafa1411}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  caddy_data:
  caddy_config:
